<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Login</title>

    ```
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:'Segoe UI',sans-serif;
        }

        .login-card{
            width:100%;
            max-width:450px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.25);
        }

        .login-icon{
            text-align:center;
            font-size:55px;
            margin-bottom:10px;
        }

        .login-title{
            text-align:center;
            color:#1e3c72;
            font-weight:700;
            margin-bottom:25px;
        }

        .form-label{
            font-weight:600;
            color:#444;
        }

        .form-control{
            border-radius:10px;
            padding:12px;
        }

        .btn-login{
            width:100%;
            background:#1e3c72;
            color:white;
            border:none;
            padding:12px;
            border-radius:10px;
            font-weight:600;
            transition:.3s;
        }

        .btn-login:hover{
            background:#2a5298;
        }

        .links{
            text-align:center;
            margin-top:20px;
        }

        .links a{
            text-decoration:none;
            font-weight:600;
        }

    </style>
    ```

</head>

<body>

<div class="login-card">

    ```
    <div class="login-icon">
        🏠
    </div>

    <h2 class="login-title">
        Resident Login
    </h2>

    <form th:action="@{/new/login}" method="post">

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text"
                   name="userName"
                   class="form-control"
                   placeholder="Enter username"
                   required>
        </div>

        <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Enter password"
                   required>
        </div>

        <button type="submit" class="btn-login">
            Login
        </button>

        <div class="links">

            <p class="mt-3">
                Don't have an account?
            </p>

            <a th:href="@{/new/signup}">
                SignUp
            </a>

            <span class="mx-2">|</span>

            <a th:href="@{/new/adminSignup}">
                Admin SignUp
            </a>

        </div>

    </form>
    ```

</div>

</body>
</html>

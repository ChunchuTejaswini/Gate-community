<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#1e3c72,#2a5298);
            min-height:100vh;
            font-family:'Segoe UI',sans-serif;
        }

        .dashboard-container{
            padding:50px 20px;
        }

        .welcome-card{
            background:white;
            border-radius:20px;
            padding:30px;
            text-align:center;
            margin-bottom:30px;
            box-shadow:0 10px 25px rgba(0,0,0,.15);
        }

        .welcome-card h1{
            color:#1e3c72;
            font-weight:700;
        }

        .feature-card{
            background:white;
            border-radius:20px;
            padding:30px;
            height:100%;
            box-shadow:0 10px 25px rgba(0,0,0,.15);
            transition:.3s;
        }

        .feature-card:hover{
            transform:translateY(-5px);
        }

        .feature-card h3{
            color:#1e3c72;
            font-weight:700;
            margin-bottom:15px;
        }

        .feature-card p{
            color:#666;
            margin-bottom:25px;
        }

        .btn-custom{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            font-weight:600;
            color:white;
        }

        .btn-complaints{
            background:#dc3545;
        }

        .btn-residents{
            background:#0d6efd;
        }

        .admin-icon{
            font-size:60px;
            margin-bottom:10px;
        }

    </style>
</head>

<body>

<div class="container dashboard-container">

    <div class="welcome-card">

        <div class="admin-icon">
            🏢
        </div>

        <h1>
            Welcome
            <span th:text="${name}"></span>
        </h1>

        <p class="text-muted">
            Gated Community Management - Admin Portal
        </p>

    </div>

    <div class="row g-4">

        <div class="col-md-6">

            <div class="feature-card">

                <h3>
                    📋 Resident Complaints
                </h3>

                <p>
                    View and manage all complaints raised by residents.
                </p>

                <a th:href="@{/new/getAllComplaints(username=${name})}">
                    <button type="button"
                            class="btn-custom btn-complaints">
                        View All Complaints
                    </button>
                </a>

            </div>

        </div>

        <div class="col-md-6">

            <div class="feature-card">

                <h3>
                    👥 Residents Directory
                </h3>

                <p>
                    View all registered residents in the community.
                </p>

                <a th:href="@{/new/getAllResidents(username=${name})}">
                    <button type="button"
                            class="btn-custom btn-residents">
                        View Residents
                    </button>
                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#1e3c72,#2a5298);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
            font-family:'Segoe UI',sans-serif;
        }

        .signup-card{
            width:100%;
            max-width:650px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 15px 35px rgba(0,0,0,.25);
        }

        .title{
            text-align:center;
            color:#1e3c72;
            font-weight:700;
            margin-bottom:25px;
        }

        .form-label{
            font-weight:600;
            color:#444;
        }

        .form-control{
            border-radius:10px;
            padding:12px;
        }

        .btn-register{
            width:100%;
            background:#1e3c72;
            color:white;
            border:none;
            padding:12px;
            border-radius:10px;
            font-size:16px;
            font-weight:600;
            transition:.3s;
        }

        .btn-register:hover{
            background:#2a5298;
        }

        .info-box{
            background:#e8f5e9;
            color:#2e7d32;
            padding:10px;
            border-radius:10px;
            margin-bottom:15px;
            text-align:center;
        }

        .links{
            text-align:center;
            margin-top:20px;
        }

        .links a{
            text-decoration:none;
            font-weight:600;
        }

        .admin-icon{
            text-align:center;
            font-size:55px;
            margin-bottom:10px;
        }

        .error-text{
            color:red;
            text-align:center;
            font-weight:600;
        }

    </style>

</head>

<body>

<div class="signup-card">

    <div class="admin-icon">
        👨‍💼
    </div>

    <h2 class="title">
        Admin Registration
    </h2>

    <form th:action="@{/new/adminsignUp}"
          method="post"
          th:object="${residents}">

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text"
                   class="form-control"
                   th:field="*{userName}">
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password"
                   class="form-control"
                   th:field="*{password}">
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email"
                   class="form-control"
                   th:field="*{email}">
        </div>

        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text"
                   class="form-control"
                   th:field="*{fullName}">
        </div>

        <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="number"
                   class="form-control"
                   th:field="*{phNo}">
        </div>

        <div class="mb-3">
            <label class="form-label">Admin Secret Key</label>
            <input type="password"
                   class="form-control"
                   th:field="*{secret}">
        </div>

        <p th:if="${error}"
           th:text="${error}"
           class="error-text">
        </p>

        <div class="info-box">
            Contact System Administrator for the Secret Key
        </div>

        <button type="submit"
                class="btn-register">
            Register Admin
        </button>

        <div class="links">

            <p class="mt-3">
                Already an admin?

                <a th:href="@{/new/adminLogin}">
                    Login
                </a>
            </p>

            <a th:href="@{/new/signin}">
                Back To Login
            </a>

            <span class="mx-2">|</span>

            <a th:href="@{/new/signup}">
                Register As User
            </a>

        </div>

    </form>

</div>

</body>
</html>

<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Password Mismatch</title>

    ```
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:'Segoe UI',sans-serif;
        }

        .error-card{
            background:white;
            padding:40px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,.25);
            max-width:450px;
            width:100%;
        }

        .error-icon{
            font-size:60px;
            margin-bottom:10px;
        }

        .error-title{
            color:#dc3545;
            font-weight:700;
            margin-bottom:10px;
        }

        .error-text{
            color:#555;
            font-size:16px;
            margin-bottom:20px;
        }

        .btn-home{
            background:#1e3c72;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:10px;
            font-weight:600;
            text-decoration:none;
            display:inline-block;
            transition:.3s;
        }

        .btn-home:hover{
            background:#2a5298;
            color:white;
        }

    </style>
    ```

</head>

<body>

<div class="error-card">

    ```
    <div class="error-icon">
        ⚠️
    </div>

    <h2 class="error-title">
        Password Mismatch
    </h2>

    <p class="error-text">
        The password you entered does not match. Please try again.
    </p>

    <a th:href="@{/new/signin}" class="btn-home">
        Go Back to Login
    </a>
    ```

</div>

</body>
</html>

<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Signup</title>

    ```
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:'Segoe UI',sans-serif;
            padding:20px;
        }

        .signup-card{
            width:100%;
            max-width:550px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.25);
        }

        .signup-icon{
            text-align:center;
            font-size:55px;
            margin-bottom:10px;
        }

        .signup-title{
            text-align:center;
            color:#1e3c72;
            font-weight:700;
            margin-bottom:25px;
        }

        .form-label{
            font-weight:600;
            color:#444;
        }

        .form-control{
            border-radius:10px;
            padding:12px;
        }

        .btn-signup{
            width:100%;
            background:#1e3c72;
            color:white;
            border:none;
            padding:12px;
            border-radius:10px;
            font-weight:600;
            transition:.3s;
        }

        .btn-signup:hover{
            background:#2a5298;
        }

        .links{
            text-align:center;
            margin-top:20px;
        }

        .links a{
            text-decoration:none;
            font-weight:600;
        }

    </style>
    ```

</head>

<body>

<div class="signup-card">

    ```
    <div class="signup-icon">
        🏠
    </div>

    <h2 class="signup-title">
        Resident Registration
    </h2>

    <form th:action="@{/new/signUp}"
          method="post"
          th:object="${residents}">

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text"
                   class="form-control"
                   th:field="*{userName}"
                   placeholder="Enter username">
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password"
                   class="form-control"
                   th:field="*{password}"
                   placeholder="Enter password">
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email"
                   class="form-control"
                   th:field="*{email}"
                   placeholder="Enter email">
        </div>

        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text"
                   class="form-control"
                   th:field="*{fullName}"
                   placeholder="Enter full name">
        </div>

        <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="number"
                   class="form-control"
                   th:field="*{phNo}"
                   placeholder="Enter phone number">
        </div>

        <button type="submit" class="btn-signup">
            Sign Up
        </button>

        <div class="links">
            <p class="mt-3">
                Already signed up?
                <a th:href="@{/new/signin}">
                    Sign In
                </a>
            </p>
        </div>

    </form>
    ```

</div>

</body>
</html>

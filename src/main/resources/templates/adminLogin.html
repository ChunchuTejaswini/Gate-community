<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body{
            margin:0;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            font-family:'Segoe UI',sans-serif;
        }

        .login-card{
            width:100%;
            max-width:450px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.25);
        }

        .login-title{
            text-align:center;
            margin-bottom:30px;
            color:#1e3c72;
            font-weight:700;
        }

        .form-label{
            font-weight:600;
            color:#444;
        }

        .form-control{
            border-radius:10px;
            padding:12px;
        }

        .btn-login{
            width:100%;
            background:#1e3c72;
            color:white;
            border:none;
            border-radius:10px;
            padding:12px;
            font-size:16px;
            font-weight:600;
            transition:0.3s;
        }

        .btn-login:hover{
            background:#2a5298;
        }

        .signup-links{
            text-align:center;
            margin-top:20px;
        }

        .signup-links a{
            text-decoration:none;
            font-weight:600;
        }

        .community-icon{
            text-align:center;
            font-size:50px;
            margin-bottom:10px;
        }
    </style>
</head>

<body>

<div class="login-card">

    <div class="community-icon">
        🏢
    </div>

    <h2 class="login-title">
        Admin Login
    </h2>

    <form th:action="@{/new/adminlogin}" method="post">

        <div class="mb-3">
            <label class="form-label">
                Username
            </label>
            <input type="text"
                   name="userName"
                   class="form-control"
                   placeholder="Enter username"
                   required>
        </div>

        <div class="mb-4">
            <label class="form-label">
                Password
            </label>
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Enter password"
                   required>
        </div>

        <button type="submit" class="btn-login">
            Login
        </button>

        <div class="signup-links">
            <p class="mt-3">
                Don't have an account?
            </p>

            <a th:href="@{/new/signup}">
                User SignUp
            </a>

            <span class="mx-2">|</span>

            <a th:href="@{/new/adminSignup}">
                Admin SignUp
            </a>
        </div>

    </form>

</div>

</body>
</html>

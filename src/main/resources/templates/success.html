<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Resident Dashboard</title>

    ```
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            min-height:100vh;
            font-family:'Segoe UI',sans-serif;
        }

        .dashboard-container{
            padding:50px 20px;
        }

        .welcome-card{
            background:white;
            border-radius:20px;
            padding:30px;
            text-align:center;
            margin-bottom:30px;
            box-shadow:0 10px 25px rgba(0,0,0,.15);
        }

        .welcome-card h1{
            color:#1e3c72;
            font-weight:700;
        }

        .welcome-card p{
            color:#666;
        }

        .feature-card{
            background:white;
            border-radius:20px;
            padding:25px;
            height:100%;
            box-shadow:0 10px 25px rgba(0,0,0,.15);
            transition:.3s;
        }

        .feature-card:hover{
            transform:translateY(-5px);
        }

        .feature-card h3{
            color:#1e3c72;
            font-weight:700;
            margin-bottom:10px;
        }

        .feature-card p{
            color:#555;
            margin-bottom:20px;
        }

        .btn-custom{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            font-weight:600;
            color:white;
        }

        .btn-primary-custom{
            background:#1e3c72;
        }

        .btn-success-custom{
            background:#198754;
        }

        .btn-info-custom{
            background:#0dcaf0;
            color:#000;
        }

        .icon{
            font-size:45px;
            margin-bottom:10px;
        }

    </style>
    ```

</head>

<body>

<div class="container dashboard-container">

    ```
    <div class="welcome-card">

        <div class="icon">🏠</div>

        <h1>
            Welcome
            <span th:text="${name}"></span>
        </h1>

        <p>
            Resident Portal - Manage your complaints easily
        </p>

    </div>

    <div class="row g-4">

        <div class="col-md-4">

            <div class="feature-card">

                <div class="icon">📝</div>

                <h3>Submit Complaint</h3>

                <p>Raise a new issue with details and category.</p>

                <a th:href="@{/new/getCom(username=${name})}">
                    <button class="btn-custom btn-primary-custom">
                        Open Form
                    </button>
                </a>

            </div>

        </div>

        <div class="col-md-4">

            <div class="feature-card">

                <div class="icon">📋</div>

                <h3>View Complaints</h3>

                <p>Check all your complaints and their status.</p>

                <a th:href="@{/new/getAll(username=${name})}">
                    <button class="btn-custom btn-info-custom">
                        View List
                    </button>
                </a>

            </div>

        </div>

        <div class="col-md-4">

            <div class="feature-card">

                <div class="icon">✅</div>

                <h3>Solved Complaints</h3>

                <p>View only resolved issues.</p>

                <a th:href="@{/new/viewSolved(username=${name})}">
                    <button class="btn-custom btn-success-custom">
                        See Solved
                    </button>
                </a>

            </div>

        </div>

    </div>
    ```

</div>

</body>
</html>

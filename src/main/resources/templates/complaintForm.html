<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Complaint Form</title>

    ```
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            min-height:100vh;
            font-family:'Segoe UI',sans-serif;
            padding:30px;
        }

        .form-card{
            background:white;
            max-width:700px;
            margin:auto;
            border-radius:20px;
            padding:40px;
            box-shadow:0 10px 30px rgba(0,0,0,.2);
        }

        .form-title{
            text-align:center;
            color:#1e3c72;
            font-weight:700;
            margin-bottom:25px;
        }

        .form-icon{
            text-align:center;
            font-size:55px;
            margin-bottom:10px;
        }

        .form-label{
            font-weight:600;
            color:#444;
        }

        .form-control,
        select{
            border-radius:10px;
            padding:10px;
        }

        .btn-submit{
            width:100%;
            background:#1e3c72;
            color:white;
            border:none;
            padding:12px;
            border-radius:10px;
            font-weight:600;
            transition:.3s;
        }

        .btn-submit:hover{
            background:#2a5298;
        }

        .readonly-field{
            background:#f1f3f5;
        }

    </style>
    ```

</head>

<body>

<div class="form-card">

    ```
    <div class="form-icon">
        📝
    </div>

    <h2 class="form-title">
        Submit Complaint
    </h2>

    <h5 class="text-center mb-4">
        Welcome <span th:text="${name}"></span>
    </h5>

    <form th:action="@{/new/addComp}"
          method="post"
          th:object="${complaint}">

        <div class="mb-3">
            <label class="form-label">User Name</label>
            <input type="text"
                   class="form-control readonly-field"
                   th:field="*{username}"
                   readonly>
        </div>

        <div class="mb-3">
            <label class="form-label">Complaint Category</label>
            <select class="form-control"
                    th:field="*{category}">
                <option value="Water">Water</option>
                <option value="Electricity">Electricity</option>
                <option value="Parking">Parking</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Subject</label>
            <input type="text"
                   class="form-control"
                   th:field="*{subject}"
                   placeholder="Enter subject">
        </div>

        <div class="mb-3">
            <label class="form-label">Complaint Details</label>
            <input type="text"
                   class="form-control"
                   th:field="*{description}"
                   placeholder="Describe your issue">
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="text"
                   class="form-control readonly-field"
                   th:field="*{email}"
                   readonly>
        </div>

        <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="number"
                   class="form-control readonly-field"
                   th:field="*{phNo}"
                   readonly>
        </div>

        <button type="submit" class="btn-submit">
            Submit Complaint
        </button>

    </form>
    ```

</div>

</body>
</html>

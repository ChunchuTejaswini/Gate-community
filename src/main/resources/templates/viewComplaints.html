<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Complaints</title>

    ```
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            min-height:100vh;
            font-family:'Segoe UI',sans-serif;
            padding:30px;
        }

        .main-card{
            background:white;
            border-radius:20px;
            padding:30px;
            box-shadow:0 10px 30px rgba(0,0,0,.2);
        }

        .header{
            text-align:center;
            margin-bottom:25px;
        }

        .header h1{
            color:#1e3c72;
            font-weight:700;
        }

        .header p{
            color:#666;
        }

        .table{
            margin-bottom:0;
        }

        .table thead{
            background:#1e3c72;
            color:white;
        }

        .table tbody tr:hover{
            background:#f5f9ff;
        }

        .status-badge{
            padding:5px 12px;
            border-radius:20px;
            font-size:12px;
            font-weight:600;
            color:white;
        }

        .pending{
            background:#ffc107;
            color:black;
        }

        .inprogress{
            background:#0dcaf0;
            color:black;
        }

        .solved{
            background:#198754;
        }

        .icon{
            font-size:50px;
            margin-bottom:10px;
        }

        .table-responsive{
            border-radius:15px;
            overflow:hidden;
        }

    </style>
    ```

</head>

<body>

<div class="container">

    ```
    <div class="main-card">

        <div class="header">

            <div class="icon">📋</div>

            <h1>
                My Complaints
            </h1>

            <p>
                Welcome
                <span th:text="${name}"></span>
                - Track your complaint status
            </p>

        </div>

        <div class="table-responsive">

            <table class="table table-striped table-hover table-bordered text-center">

                <thead>
                <tr>
                    <th>Complaint ID</th>
                    <th>Category</th>
                    <th>Subject</th>
                    <th>Description</th>
                    <th>Status</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="c:${complaints}">

                    <td th:text="${c.complaintId}"></td>

                    <td th:text="${c.category}"></td>

                    <td th:text="${c.subject}"></td>

                    <td th:text="${c.description}"></td>

                    <td>

                    <span th:text="${c.status}"
                          class="status-badge"
                          th:classappend="${
                            c.status == 'PENDING' ? ' pending' :
                            (c.status == 'INPROGRESS' ? ' inprogress' :
                            ' solved')
                          }">
                    </span>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>
    ```

</div>

</body>
</html>

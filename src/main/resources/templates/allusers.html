<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Residents Directory</title>

    ```
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            min-height:100vh;
            font-family:'Segoe UI',sans-serif;
            padding:30px;
        }

        .main-card{
            background:white;
            border-radius:20px;
            padding:30px;
            box-shadow:0 10px 30px rgba(0,0,0,.2);
        }

        .header-section{
            text-align:center;
            margin-bottom:25px;
        }

        .header-section h1{
            color:#1e3c72;
            font-weight:700;
        }

        .header-section h4{
            color:#666;
        }

        .resident-icon{
            font-size:55px;
            margin-bottom:10px;
        }

        .table-responsive{
            border-radius:15px;
            overflow:hidden;
        }

        .table{
            margin-bottom:0;
        }

        .table thead{
            background:#1e3c72;
            color:white;
        }

        .table tbody tr:hover{
            background:#f5f9ff;
        }

        .role-badge{
            background:#0d6efd;
            color:white;
            padding:5px 10px;
            border-radius:20px;
            font-size:12px;
            font-weight:600;
        }

    </style>
    ```

</head>

<body>

<div class="container">

    ```
    <div class="main-card">

        <div class="header-section">

            <div class="resident-icon">
                👥
            </div>

            <h1>
                Residents Directory
            </h1>

            <h4>
                Welcome
                <span th:text="${name}"></span>
            </h4>

        </div>

        <div class="table-responsive">

            <table class="table table-striped table-hover table-bordered">

                <thead>
                <tr>
                    <th>User ID</th>
                    <th>User Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Phone Number</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="c:${all}">

                    <td th:text="${c.userId}"></td>

                    <td th:text="${c.userName}"></td>

                    <td th:text="${c.email}"></td>

                    <td>
                    <span class="role-badge"
                          th:text="${c.role}">
                    </span>
                    </td>

                    <td th:text="${c.phNo}"></td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>
    ```

</div>

</body>
</html>

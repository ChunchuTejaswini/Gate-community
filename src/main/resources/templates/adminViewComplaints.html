<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Resident Complaints</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            min-height:100vh;
            font-family:'Segoe UI',sans-serif;
            padding:30px;
        }

        .main-card{
            background:white;
            border-radius:20px;
            padding:30px;
            box-shadow:0 10px 30px rgba(0,0,0,.2);
        }

        .page-title{
            text-align:center;
            color:#1e3c72;
            font-weight:700;
            margin-bottom:25px;
        }

        .table{
            vertical-align:middle;
        }

        .table thead{
            background:#1e3c72;
            color:white;
        }

        .status-select{
            min-width:140px;
            border-radius:8px;
        }

        .btn-update{
            background:#198754;
            color:white;
            border:none;
            border-radius:8px;
            padding:6px 15px;
            margin-top:8px;
            width:100%;
        }

        .btn-update:hover{
            background:#157347;
        }

        .complaint-icon{
            font-size:55px;
            text-align:center;
            margin-bottom:10px;
        }

        .table-responsive{
            border-radius:15px;
            overflow:hidden;
        }

    </style>
    ```

</head>

<body>

<div class="container">


    <div class="main-card">

        <div class="complaint-icon">
            📋
        </div>

        <h1 class="page-title">
            Resident Complaints Management
        </h1>

        <div class="table-responsive">

            <table class="table table-striped table-hover table-bordered">

                <thead>
                <tr>
                    <th>Complaint ID</th>
                    <th>User Name</th>
                    <th>Category</th>
                    <th>Subject</th>
                    <th>Description</th>
                    <th>Status Management</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="c:${complaints}">

                    <td th:text="${c.complaintId}"></td>

                    <td th:text="${c.username}"></td>

                    <td th:text="${c.category}"></td>

                    <td th:text="${c.subject}"></td>

                    <td th:text="${c.description}"></td>

                    <td>

                        <form th:action="@{/new/updateStatus}"
                              method="post">

                            <input type="hidden"
                                   name="complaintId"
                                   th:value="${c.complaintId}">

                            <select name="status"
                                    class="form-select status-select">

                                <option value="PENDING"
                                        th:selected="${c.status=='PENDING'}">
                                    Pending
                                </option>

                                <option value="INPROGRESS"
                                        th:selected="${c.status=='INPROGRESS'}">
                                    In Progress
                                </option>

                                <option value="SOLVED"
                                        th:selected="${c.status=='SOLVED'}">
                                    Solved
                                </option>

                            </select>

                            <button type="submit"
                                    class="btn-update">
                                Update Status
                            </button>

                        </form>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>


</div>

</body>
</html>
